<div class="login-container">
  <!-- Header -->
  <div class="login-header">
    <div class="login-logo">
      <img src="assets/logos/logo.png" alt="Logo Conservatorio del Huila" class="logo-image">
    </div>
    <h1 class="login-title">Sistema de Inventario</h1>
    <p class="login-subtitle">Conservatorio del Huila</p>
  </div>

  <div class="login-box">
    <!-- Form Container -->
    <div class="login-form-container">
      <h2 class="login-form-title">Iniciar Sesión</h2>

      <!-- Error Message -->
      <div *ngIf="error" class="alert alert-error">
        <span class="alert-icon">⚠️</span>
        <div class="alert-content">
          <span>{{ error }}</span>
        </div>
      </div>

      <!-- Success Message -->
      <div *ngIf="success" class="alert alert-success">
        <span class="alert-icon">✅</span>
        <div class="alert-content">
          <span>{{ success }}</span>
        </div>
      </div>

      <!-- Login Form -->
      <form (ngSubmit)="login()" class="login-form">
        <!-- Username -->
        <div class="form-group">
          <label class="form-label">Usuario</label>
          <div class="input-wrapper" [class.has-error]="usernameError && username">
            <input 
              type="text" 
              [(ngModel)]="username"
              (ngModelChange)="validateUsername()"
              name="username"
              class="form-input" 
              placeholder="Ingresa tu usuario"
              [disabled]="loading"
              (keypress)="onKeyPress($event)"
              autocomplete="username"
              [class.input-error]="usernameError && username"
              required>
          </div>
          <span *ngIf="usernameError && username" class="field-error">{{ usernameError }}</span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="input-wrapper" [class.has-error]="passwordError && password">
            <input 
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              (ngModelChange)="validatePassword()"
              name="password"
              class="form-input" 
              placeholder="Ingresa tu contraseña"
              [disabled]="loading"
              (keypress)="onKeyPress($event)"
              autocomplete="current-password"
              [class.input-error]="passwordError && password"
              required>
            <button 
              type="button" 
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              [disabled]="loading"
              tabindex="-1"
              title="{{ showPassword ? 'Ocultar' : 'Mostrar' }} contraseña">

              <!-- Ojo cerrado (contraseña oculta) -->
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-eye-slash-fill" viewBox="0 0 16 16">
                <path d="m10.79 12.912-1.614-1.615a3.5 3.5 0 0 1-4.474-4.474l-2.06-2.06C.938 6.278 0 8 0 8s3 5.5 8 5.5a7 7 0 0 0 2.79-.588M5.21 3.088A7 7 0 0 1 8 2.5c5 0 8 5.5 8 5.5s-.939 1.721-2.641 3.238l-2.062-2.062a3.5 3.5 0 0 0-4.474-4.474z"/>
                <path d="M5.525 7.646a2.5 2.5 0 0 0 2.829 2.829zm4.95.708-2.829-2.83a2.5 2.5 0 0 1 2.829 2.829zm3.171 6-12-12 .708-.708 12 12z"/>
              </svg>

              <!-- Ojo abierto (contraseña visible) -->
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16">
                <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
                <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8m8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7"/>
              </svg>
              
            </button>
          </div>
          <span *ngIf="passwordError && password" class="field-error">{{ passwordError }}</span>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="btn-primary"
          [disabled]="loading || !isFormValid()">
          <span *ngIf="!loading" class="btn-text">
            <span class="btn-icon">→</span>
            Ingresar al Sistema
          </span>
          <span *ngIf="loading" class="btn-loading">
            <span class="spinner"></span>
            Autenticando...
          </span>
        </button>
      </form>

      <!-- Form Hint -->
      <div class="form-hint" *ngIf="!loading && !error && !success">
        <p>Usuario Demo: <strong>maria</strong></p>
        <p>Contraseña: <strong>maria.1077224312</strong></p>
      </div>

    </div>
  </div>
</div>
